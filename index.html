<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0b0d11;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 880px;
            width: 100%;
            background: #1a1e26;
            border-radius: 32px;
            padding: 24px 24px 32px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8);
            transition: all 0.2s ease;
            border: 1px solid #2f3540;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px #2f3540;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0c10;
            object-fit: contain;
        }

        /* custom styling untuk kontrol bawaan browser agar lebih menyatu */
        video::-webkit-media-controls-panel {
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 6px;
            color: #bcc3d0;
            font-size: 0.95rem;
            flex-wrap: wrap;
            gap: 10px 16px;
        }

        .source-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #252b36;
            padding: 6px 16px 6px 14px;
            border-radius: 40px;
            border: 1px solid #343b48;
            font-weight: 500;
            font-size: 0.9rem;
            color: #d6deec;
            letter-spacing: 0.3px;
        }

        .source-badge span {
            opacity: 0.7;
            font-weight: 400;
            margin-right: 2px;
        }

        .source-badge .ip {
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
            background: #10131a;
            padding: 2px 12px 2px 10px;
            border-radius: 30px;
            color: #9bb7f0;
            border: 1px solid #2d3442;
        }

        .status-led {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1d232d;
            padding: 5px 16px 5px 14px;
            border-radius: 40px;
            border: 1px solid #2f3644;
        }

        .led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #44cf6a;
            box-shadow: 0 0 8px #2ea84c;
            transition: 0.2s;
        }

        .led.inactive {
            background: #6f7a8f;
            box-shadow: none;
        }

        .caption {
            margin-top: 14px;
            text-align: center;
            color: #7b8599;
            font-size: 0.85rem;
            border-top: 1px solid #262d39;
            padding-top: 18px;
            letter-spacing: 0.2px;
        }

        .caption a {
            color: #8db1f0;
            text-decoration: none;
            border-bottom: 1px dotted #3c4a62;
        }

        .caption a:hover {
            color: #b6ceff;
            border-bottom-color: #6f8fd1;
        }

        @media (max-width: 600px) {
            .card {
                padding: 16px 16px 24px;
                border-radius: 24px;
            }
            .info-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .source-badge {
                width: 100%;
                justify-content: space-between;
            }
            .status-led {
                width: 100%;
                justify-content: center;
            }
        }

        /* fallback jika video tidak bisa diputar */
        .error-fallback {
            display: none;
            position: absolute;
            inset: 0;
            background: #151a22;
            color: #b3bed6;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 8px;
            font-size: 1rem;
            padding: 20px;
            text-align: center;
        }

        video:not([src]) + .error-fallback,
        video[src=""] + .error-fallback {
            display: flex;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="video-wrapper">
            <!-- elemen video utama -->
            <video id="streamVideo" controls autoplay playsinline>
                <source src="http://10.101.209.97/" type="video/mp4">
                <!-- fallback jika browser tidak support tag video -->
                Browser Anda tidak mendukung pemutaran video.
            </video>
            <!-- fallback elemen jika video gagal (ditampilkan via css) -->
            <div class="error-fallback">
                <span style="font-size: 2rem; opacity: 0.4;">📡</span>
                <span>Stream tidak dapat diakses</span>
                <span style="font-size: 0.8rem; opacity: 0.6;">Pastikan alamat <strong>http://10.101.209.97/</strong> dapat dijangkau</span>
            </div>
        </div>

        <div class="info-bar">
            <div class="source-badge">
                <span>📺</span> Sumber
                <span class="ip">10.101.209.97</span>
            </div>
            <div class="status-led" id="statusIndicator">
                <span class="led" id="ledIndicator"></span>
                <span id="statusText">Menyambung...</span>
            </div>
        </div>
        <div class="caption">
            ⚡ Streaming langsung &bull; 
            <span id="timestamp"></span> &bull; 
            <a href="#" onclick="reloadVideo(); return false;">⟳ refresh</a>
        </div>
    </div>

    <script>
        (function() {
            const video = document.getElementById('streamVideo');
            const led = document.getElementById('ledIndicator');
            const statusText = document.getElementById('statusText');
            const timestampEl = document.getElementById('timestamp');

            // fungsi update status
            function setStatus(connected, message) {
                if (connected) {
                    led.className = 'led';
                    statusText.textContent = message || 'Terkoneksi';
                } else {
                    led.className = 'led inactive';
                    statusText.textContent = message || 'Tidak terhubung';
                }
            }

            // update timestamp setiap detik
            function updateTimestamp() {
                const now = new Date();
                const str = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                timestampEl.textContent = str;
            }
            updateTimestamp();
            setInterval(updateTimestamp, 1000);

            // event listener untuk video
            function handleVideoEvents() {
                // saat ada data (mulai berhasil)
                video.addEventListener('loadeddata', function() {
                    setStatus(true, 'Stream aktif');
                });

                // saat mulai diputar
                video.addEventListener('playing', function() {
                    setStatus(true, 'Memutar');
                });

                // saat pause
                video.addEventListener('pause', function() {
                    if (!video.ended) {
                        setStatus(true, 'Dijeda');
                    }
                });

                // saat selesai
                video.addEventListener('ended', function() {
                    setStatus(false, 'Stream selesai');
                });

                // error saat memuat
                video.addEventListener('error', function(e) {
                    const errorCode = video.error ? video.error.code : -1;
                    let msg = 'Gagal memuat stream';
                    if (errorCode === 4) msg = 'Media tidak ditemukan (404)';
                    else if (errorCode === 3) msg = 'Gagal decode video';
                    else if (errorCode === 2) msg = 'Jaringan bermasalah';
                    else if (errorCode === 1) msg = 'Stream dihentikan';
                    setStatus(false, msg);
                    console.warn('Video error:', video.error);
                });

                // jika buffer kosong (lag)
                video.addEventListener('waiting', function() {
                    setStatus(false, 'Buffer ...');
                });

                // saat buffer cukup lagi
                video.addEventListener('canplay', function() {
                    if (!video.paused && !video.ended) {
                        setStatus(true, 'Memutar');
                    }
                });

                // fallback jika video tidak bisa dimuat sama sekali (misal CORS, network down)
                // kita gunakan timeout untuk mendeteksi jika setelah 8 detik masih tidak ada progress
                let timeoutId = setTimeout(function() {
                    if (video.readyState === 0) {
                        setStatus(false, 'Tidak dapat menjangkau server');
                    }
                }, 8000);

                // batalkan timeout jika berhasil load
                video.addEventListener('loadedmetadata', function() {
                    clearTimeout(timeoutId);
                });

                // bersihkan timeout jika komponen dibongkar (opsional)
                window.addEventListener('beforeunload', function() {
                    clearTimeout(timeoutId);
                });
            }

            // fungsi reload video
            window.reloadVideo = function() {
                setStatus(false, 'Menyegarkan...');
                // simpan waktu sekarang untuk cache busting (opsional)
                const currentSrc = video.getAttribute('src') || 'http://10.101.209.97/';
                // jika src pakai atribut source, ambil dari source
                const sourceElement = document.querySelector('video source');
                if (sourceElement) {
                    // tetap pakai url yang sama, tapi kita trigger reload dengan reset
                    video.pause();
                    video.load(); // reset
                    // beri indikasi
                    setTimeout(() => {
                        setStatus(false, 'Menyambung ulang...');
                    }, 200);
                } else {
                    // fallback
                    video.src = currentSrc;
                    video.load();
                }
                // fokus pada video
                video.focus();
            };

            // inisialisasi
            function init() {
                // set status awal
                setStatus(false, 'Menyambung...');

                // pasang event
                handleVideoEvents();

                // cek apakah video sudah punya src (dari source)
                const source = document.querySelector('video source');
                if (source && source.getAttribute('src')) {
                    // ok
                } else {
                    // jika tidak ada source, set secara manual
                    video.src = 'http://10.101.209.97/';
                    video.load();
                }

                // tambahkan fallback jika video gagal total (dari event error sudah cover)
                // tambahan: deteksi jika video tidak bisa diputar karena CORS / network
                // kita pakai mekanisme tambahan: jika setelah 3 detik masih 0, kita beri notifikasi
                setTimeout(() => {
                    if (video.readyState === 0 && !video.error) {
                        // masih mencoba, tapi kita perhalus status
                        setStatus(false, 'Menunggu respon server...');
                    }
                }, 3000);

                // tombol refresh juga bisa dipanggil dari link
            }

            init();
        })();
    </script>

    <!-- catatan: 
        URL streaming: http://10.101.209.97/
        Karena IP berada di jaringan lokal, pastikan perangkat Anda terhubung ke jaringan yang sama.
        Jika stream menggunakan MJPEG atau format lain, mungkin perlu disesuaikan.
        Untuk MJPEG, gunakan <img> atau canvas, tetapi ini untuk video biasa (mp4/ts/webm).
    -->
</body>
</html>
