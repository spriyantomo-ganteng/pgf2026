<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Caca Cans · Update Kehidupan</title>
  <!-- Font & Ikon -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f9f3e8 0%, #ffe9d4 100%);
      font-family: 'Quicksand', sans-serif;
      padding: 1.5rem;
    }

    /* Kartu utama */
    .card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 250, 245, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2.8rem 2.8rem 3.2rem;
      box-shadow: 
        0 30px 50px -20px rgba(0, 0, 0, 0.25),
        inset 0 1px 2px rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 235, 215, 0.5);
      transition: all 0.25s ease;
      text-align: center;
    }

    /* Dekorasi header */
    .avatar-frame {
      position: relative;
      display: inline-block;
      margin-bottom: 0.8rem;
    }

    .avatar {
      width: 130px;
      height: 130px;
      background: linear-gradient(135deg, #f9b8a0, #e8847a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      color: #fff6ed;
      box-shadow: 0 18px 28px -8px rgba(210, 120, 90, 0.4);
      border: 4px solid rgba(255, 245, 235, 0.8);
      transition: transform 0.2s ease;
    }

    .avatar i {
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .avatar:hover {
      transform: scale(1.02) rotate(-2deg);
    }

    /* Ornamen gelombang kecil */
    .wave-icon {
      font-size: 1.8rem;
      margin-left: 0.3rem;
      display: inline-block;
      animation: wave 2.5s infinite ease-in-out;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      20% { transform: rotate(16deg); }
      40% { transform: rotate(-6deg); }
      60% { transform: rotate(12deg); }
      80% { transform: rotate(-4deg); }
      100% { transform: rotate(0deg); }
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #3d2a1e;
      margin: 0.25rem 0 0.2rem;
      line-height: 1.1;
    }

    h1 span {
      background: linear-gradient(120deg, #c2775c, #b45f48);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    .badge-profesi {
      display: inline-block;
      background: rgba(196, 120, 90, 0.18);
      backdrop-filter: blur(4px);
      padding: 0.6rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(196, 120, 90, 0.25);
      margin: 0.6rem 0 1.4rem;
      font-size: 1.5rem;
      font-weight: 600;
      color: #4d3426;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 12px -6px rgba(150, 80, 50, 0.15);
    }

    .badge-profesi i {
      margin-right: 10px;
      color: #b45f48;
      font-size: 1.3rem;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #e6b8a2, #d4957a);
      border-radius: 8px;
      margin: 0.8rem auto 1.8rem;
      opacity: 0.6;
    }

    .bio {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #4d3a2e;
      max-width: 460px;
      margin: 0 auto 2.2rem;
      background: rgba(255, 240, 230, 0.5);
      padding: 1.2rem 1.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 190, 0.3);
      font-weight: 400;
    }

    .bio i {
      color: #b45f48;
      margin: 0 4px;
    }

    /* Grid fitur / sosial */
    .feature-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem 1.8rem;
      margin: 2rem 0 1.8rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 245, 235, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1.4rem 0.5rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 190, 0.4);
      font-weight: 500;
      color: #3d2a1e;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px -4px rgba(140, 80, 50, 0.08);
    }

    .feature-item i {
      font-size: 1.3rem;
      color: #b45f48;
      width: 1.6rem;
      text-align: center;
    }

    .feature-item:hover {
      background: rgba(255, 235, 215, 0.8);
      transform: translateY(-3px);
      border-color: #d4957a;
      box-shadow: 0 12px 20px -10px rgba(160, 90, 60, 0.2);
    }

    /* Tombol ajakan */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #d9997e, #be765b);
      border: none;
      padding: 0.9rem 2.6rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fffcf7;
      box-shadow: 0 12px 24px -8px rgba(160, 90, 60, 0.4);
      cursor: default;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 235, 210, 0.4);
      margin-top: 0.5rem;
      letter-spacing: 0.3px;
    }

    .cta-button i {
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .cta-button:hover {
      transform: scale(1.02);
      box-shadow: 0 18px 30px -10px #b46a4e;
      background: linear-gradient(135deg, #e4a388, #c88164);
    }

    .cta-button:hover i {
      transform: translateX(4px);
    }

    /* footer kecil */
    .footnote {
      margin-top: 2.4rem;
      font-size: 0.9rem;
      color: #897061;
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(210, 175, 155, 0.25);
      padding-top: 1.8rem;
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
    }

    .footnote span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 235, 215, 0.3);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    .footnote i {
      color: #b45f48;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 550px) {
      .card {
        padding: 2rem 1.5rem 2.5rem;
        border-radius: 32px;
      }
      h1 {
        font-size: 2.6rem;
      }
      .badge-profesi {
        font-size: 1.2rem;
        padding: 0.4rem 1.4rem;
      }
      .bio {
        font-size: 1rem;
        padding: 1rem 1.2rem;
      }
      .avatar {
        width: 100px;
        height: 100px;
        font-size: 3.2rem;
      }
      .feature-grid {
        gap: 0.7rem;
      }
      .feature-item {
        padding: 0.3rem 1rem 0.3rem 0.8rem;
        font-size: 0.9rem;
      }
      .cta-button {
        padding: 0.7rem 1.8rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 400px) {
      .card {
        padding: 1.6rem 1rem;
      }
      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Bagian avatar & nama -->
    <div class="avatar-frame">
      <div class="avatar">
        <i class="fas fa-pen-fancy"></i>
      </div>
    </div>

    <h1>
      Caca Cans
      <span class="wave-icon">👋</span>
    </h1>

    <!-- Profesi dengan ikon -->
    <div class="badge-profesi">
      <i class="fas fa-sync-alt fa-fw"></i> Update Kehidupan
    </div>

    <div class="divider"></div>

    <!-- Bio singkat -->
    <div class="bio">
      <i class="fas fa-quote-left" style="opacity:0.5; margin-right: 6px;"></i>
      Menulis ulang cerita, satu <i class="fas fa-heart" style="color:#d47a62;"></i> 
      momen berharga dalam keseharian.
      <i class="fas fa-quote-right" style="opacity:0.5; margin-left: 6px;"></i>
    </div>

    <!-- Grid "keahlian" / nilai -->
    <div class="feature-grid">
      <div class="feature-item">
        <i class="fas fa-camera-retro"></i> Momen
      </div>
      <div class="feature-item">
        <i class="fas fa-pencil-alt"></i> Catatan
      </div>
      <div class="feature-item">
        <i class="fas fa-smile-beam"></i> Cerita
      </div>
      <div class="feature-item">
        <i class="fas fa-seedling"></i> Tumbuh
      </div>
    </div>

    <!-- Tombol ajakan (non-aktif, hanya estetika) -->
    <div class="cta-button">
      <i class="fas fa-arrow-right"></i> Lihat update terbaru
    </div>

    <!-- footer kecil dengan info tambahan -->
    <div class="footnote">
      <span><i class="fas fa-calendar-check"></i> #HariIni</span>
      <span><i class="fas fa-hashtag"></i> #KehidupanCaca</span>
      <span><i class="fas fa-mug-hot"></i> setiap hari</span>
    </div>
  </div>
</body>
</html>
