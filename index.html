<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            color: #e0e0e0;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        video, iframe {
            width: 100%;
            height: auto;
            max-height: 500px;
            display: block;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Live / Playback Video Stream</h1>

        <div class="video-wrapper">
            <!-- Pilihan 1: Jika server 10.101.209.97 menyediakan file video (MP4/WebM) atau stream HTML5 langsung -->
            <video controls autoplay muted>
                <source src="http://10.101.209.97/video.mp4" type="video/mp4">
                <!-- Ubah "video.mp4" di atas sesuai path/nama file video asli di server -->
                Browser Anda tidak mendukung pemutar video HTML5.
            </video>

            <!-- Pilihan 2: Jika server 10.101.209.97 adalah halaman web/CCTV interface, gunakan iframe di bawah ini (opsional): -->
            <!-- <iframe src="http://10.101.209.97/" frameborder="0" allowfullscreen></iframe> -->
        </div>

        <p class="status">Source IP: <strong>10.101.209.97</strong></p>
    </div>

</body>
</html>
