<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            width: 100%; max-width: 900px; background-color: #1e1e1e;
            border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); text-align: center;
        }
        h1 { margin-bottom: 20px; font-size: 1.8rem; color: #e0e0e0; }
        .video-wrapper {
            position: relative; width: 100%; border-radius: 8px; overflow: hidden; background-color: #000;
        }
        video { width: 100%; height: auto; max-height: 500px; display: block; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Live / Playback Video Stream</h1>

        <div class="video-wrapper">
            <!-- Tambahkan proksi HTTPS di depan URL stream lokal Anda -->
            <video id="videoStream" controls autoplay muted playsinline>
                <source src="https://api.allorigins.win/raw?url=http://10.101.209.97/video.mp4" type="video/mp4">
                Browser Anda tidak mendukung pemutar video HTML5.
            </video>
        </div>

        <p class="status">Source IP: <strong>10.101.209.97 (Proxied via HTTPS)</strong></p>
    </div>

</body>
</html>
